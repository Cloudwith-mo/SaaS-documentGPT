AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DocumentGPT API

Globals:
  Function:
    Runtime: python3.9
    Timeout: 30
    Environment:
      Variables:
        DYNAMODB_TABLE: documents
        S3_BUCKET: documentgpt-uploads

Resources:
  # API Gateway
  DocumentGPTApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

  # Lambda Functions
  AgentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: agents_handler.lambda_handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentGPTApi
            Path: /api/agents
            Method: get

  PdfSearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: pdf_search_handler.lambda_handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentGPTApi
            Path: /api/pdf/search
            Method: post

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: health_handler.lambda_handler
      Events:
        ApiHealth:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentGPTApi
            Path: /api/health
            Method: get
        ApiV5Health:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentGPTApi
            Path: /api/v5/health
            Method: get

  MultiAgentDebateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: multi_agent_debate_handler.lambda_handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentGPTApi
            Path: /api/v5/multi-agent-debate
            Method: post

  DocumentsV5Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: documents_handler.lambda_handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentGPTApi
            Path: /api/v5/documents
            Method: get

  ChatV5Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: simple_rag_handler.lambda_handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref DocumentGPTApi
            Path: /api/v5/chat
            Method: post

  # DynamoDB Table
  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: documents
      AttributeDefinitions:
        - AttributeName: docId
          AttributeType: S
      KeySchema:
        - AttributeName: docId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true

  # S3 Bucket
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: documentgpt-uploads
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # SNS Topic
  DocumentProcessingTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: document-processing-notifications

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${DocumentGPTApi}.execute-api.${AWS::Region}.amazonaws.com/prod"