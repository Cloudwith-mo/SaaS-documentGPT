    <title>DocumentsGPT v5</title>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .gradient-text { background: linear-gradient(to right, #10b981, #14b8a6, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-btn { background: linear-gradient(to right, #10b981, #0ea5e9); }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }

<body class="w-full min-h-screen bg-[#f7fafc] text-slate-800 grid grid-rows-[56px_1fr]">
    <!-- TOP BAR -->
    <div class="px-3 md:px-4 h-14 flex items-center justify-between border-b border-slate-200/80 bg-white/70 backdrop-blur">
        <div class="flex items-center gap-2 md:gap-3">
            <button id="navToggle" class="mr-1 p-2 hover:bg-slate-100 rounded" onclick="toggleNav()">
                <i data-lucide="panel-left-close" class="h-5 w-5" id="navIcon"></i>
            </button>
            <i data-lucide="sparkles" class="h-5 w-5 text-emerald-500"></i>
            <span class="text-base md:text-lg font-semibold gradient-text">DocumentsGPT</span>
            <span class="ml-2 px-2 py-1 text-xs border border-slate-200 rounded hidden md:inline">v5</span>
        </div>
        <div class="flex items-center gap-2">
            <button id="modelBtn" class="px-3 py-1 border border-slate-200 rounded text-sm hidden md:inline" onclick="openModelModal()">Model: GPT-4-Turbo</button>
            <button id="debateBtn" class="px-3 py-1 border border-slate-200 rounded text-sm hidden md:inline flex items-center gap-1" onclick="toggleDebate()">
                <i data-lucide="users" class="h-4 w-4"></i>Debate
            </button>
            <button id="agentsBtn" class="px-3 py-1 border border-slate-200 rounded text-sm hidden md:inline">Agents</button>
        </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div id="mainGrid" class="grid gap-3 p-3 grid-cols-[260px_1fr] md:grid-cols-[280px_1fr_520px]">
        <!-- LEFT: Sidebar -->
        <aside id="sidebar" class="rounded-2xl bg-white/90 backdrop-blur border border-slate-200 flex flex-col order-1">
            <div class="p-3 flex flex-col gap-2">
                <div class="grid grid-cols-2 gap-2">
                    <button class="gradient-btn text-white rounded-lg px-3 py-2 flex items-center justify-center gap-2" onclick="startNewChat()">
                        <i data-lucide="message-circle" class="h-4 w-4"></i>New Chat
                    </button>
                    <button class="border border-slate-200 rounded-lg px-3 py-2" onclick="handlePickFile()">Upload</button>
                    <input type="file" id="fileUpload" accept="application/pdf" style="display:none" onchange="handleUploadFile(event)">
                </div>
            </div>
            <div class="px-4 text-[11px] uppercase tracking-wide text-slate-500">Agent Presets</div>
            <div class="p-3 space-y-2">
                <button onclick="usePreset('Legal/Finance/Compliance')" class="w-full text-left rounded-xl border border-slate-200/80 bg-white/90 px-3 py-2 hover:bg-white text-sm">Legal/Finance/Compliance</button>
                <button onclick="usePreset('Tech/Design/PM')" class="w-full text-left rounded-xl border border-slate-200/80 bg-white/90 px-3 py-2 hover:bg-white text-sm">Tech/Design/PM</button>
            </div>
            <div class="px-4 text-[11px] uppercase tracking-wide text-slate-500">Chat History</div>
            <div class="flex-1 overflow-y-auto">
                <div class="p-3 space-y-2">
                    <button class="w-full text-left rounded-xl border border-slate-200/80 bg-white/90 px-3 py-2 hover:bg-white">
                        <div class="text-sm">AI assistant</div>
                        <div class="text-[11px] text-slate-500">updated 2h ago</div>
                    </button>
                    <button class="w-full text-left rounded-xl border border-slate-200/80 bg-white/90 px-3 py-2 hover:bg-white">
                        <div class="text-sm">Q3 review</div>
                        <div class="text-[11px] text-slate-500">updated 2h ago</div>
                    </button>
                </div>
            </div>
            <div class="p-3 border-t border-slate-200/80 flex items-center justify-between">
                <button class="text-xs text-slate-500">Settings</button>
                <button class="text-xs bg-gradient-to-r from-emerald-500 to-sky-500 bg-clip-text text-transparent">Upgrade</button>
            </div>
        </aside>

        <!-- CENTER: PDF Panel -->
        <section class="rounded-2xl bg-white/90 backdrop-blur border border-slate-200 overflow-hidden order-2">
            <div class="h-12 px-3 md:px-4 flex items-center justify-between border-b border-slate-200/80 bg-white/70">
                <div class="flex items-center gap-2">
                    <i data-lucide="file-text" class="h-4 w-4"></i>
                    <span class="font-medium truncate max-w-[60vw]" id="docName">Sample.pdf</span>
                    <span class="text-slate-500 hidden md:inline" id="docPages">• 3p</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-2 top-2.5 h-4 w-4 text-slate-400"></i>
                        <input id="searchInput" value="" onkeydown="if(event.key==='Enter') handleSearch()" class="pl-8 bg-white/70 border border-slate-200 rounded text-slate-800 placeholder:text-slate-400 w-[200px] md:w-[260px]" placeholder="Search in PDF">
                    </div>
                    <button class="px-3 py-1 border border-slate-200 rounded text-sm" onclick="handleSearch()">Find</button>
                </div>
            </div>
            <div class="grid grid-cols-[120px_1fr] md:grid-cols-[180px_1fr] h-[calc(100vh-56px-72px-24px)]">
                <div class="border-r border-slate-200/80 bg-white/60 overflow-y-auto">
                    <div class="p-2 space-y-2" id="pageNav"></div>
                </div>
                <div class="p-2 md:p-4 flex items-center justify-center bg-white/60">
                    <div id="pdfViewer" class="relative w-full h-full bg-white border border-slate-200 rounded-lg flex items-center justify-center overflow-hidden">
                        <div id="pdfContent" class="text-sm text-slate-500">Select a document to view</div>
                        <div id="highlights"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- RIGHT: Chat -->
        <section class="rounded-2xl bg-white/90 backdrop-blur border border-slate-200 flex flex-col overflow-hidden order-3">
            <div class="h-12 px-3 md:px-4 flex items-center justify-between border-b border-slate-200/80 bg-white/70">
                <button class="flex items-center gap-2 border border-slate-200 rounded px-3 py-1" onclick="toggleAgentDocs()">
                    <i data-lucide="bot" class="h-4 w-4"></i>Agent & Docs
                    <i data-lucide="chevron-down" class="h-4 w-4"></i>
                </button>
                <button class="border border-slate-200 rounded px-3 py-1 text-sm" onclick="openModelModal()">Model: GPT-4-Turbo</button>
            </div>

            <div id="chatMessages" class="flex-1 overflow-y-auto p-3 md:p-4 space-y-3 bg-white/60"></div>

            <div class="border-t border-slate-200/80 p-3 bg-white/70">
                <div class="rounded-2xl bg-white/80 border border-slate-200 p-2">
                    <div class="px-2 py-1 flex gap-2 flex-wrap">
                        <span class="suggestion-chip rounded-full border border-slate-200 px-3 py-1 text-xs text-slate-700 bg-white cursor-pointer" onclick="useSuggestion('Summarize')">Summarize</span>
                        <span class="suggestion-chip rounded-full border border-slate-200 px-3 py-1 text-xs text-slate-700 bg-white cursor-pointer" onclick="useSuggestion('List key risks')">List key risks</span>
                        <span class="suggestion-chip rounded-full border border-slate-200 px-3 py-1 text-xs text-slate-700 bg-white cursor-pointer" onclick="useSuggestion('Find clauses')">Find clauses</span>
                        <span class="suggestion-chip rounded-full border border-slate-200 px-3 py-1 text-xs text-slate-700 bg-white cursor-pointer" onclick="useSuggestion('Draft email')">Draft email</span>
                    </div>
                    <div class="flex items-end gap-2 p-2">
                        <button class="rounded-full border border-slate-200 p-2" onclick="handlePickFile()">
                            <i data-lucide="paperclip" class="h-4 w-4"></i>
                        </button>
                        <div class="relative w-full max-w-full">
                            <textarea id="messageInput" placeholder="Ask anything about your documents…" class="min-h-[44px] max-h-40 resize-y bg-transparent text-slate-800 placeholder:text-slate-400 border-0 w-full" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleSend();}"></textarea>
                        </div>
                        <button class="rounded-full gradient-btn text-white p-2" onclick="handleSend()">
                            <i data-lucide="send" class="h-4 w-4"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div id="consensusBar" class="hidden border-t border-slate-200/80 bg-white/90 px-4 py-2 text-sm flex items-center gap-2">
                <span class="px-2 py-1 bg-slate-100 border border-slate-200 rounded text-xs">Consensus</span>
                <span class="truncate" id="consensusText">Consensus pending...</span>
                <div class="ml-auto flex gap-2">
                    <button class="text-sm px-2 py-1">View Debate</button>
                    <button class="text-sm px-2 py-1 gradient-btn text-white rounded">Export</button>
                </div>
            </div>
        </section>
    </div>

    <!-- MODEL MODAL -->
    <div id="modelModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/30">
        <div class="bg-white rounded-xl shadow-lg p-6 w-96">
            <h2 class="text-lg font-semibold mb-4">Select Model</h2>
            <div class="space-y-2">
                <button class="w-full text-left px-3 py-2 border border-slate-200 rounded hover:bg-slate-50" onclick="selectModel('gpt-5')">GPT-5 (Quality)</button>
                <button class="w-full text-left px-3 py-2 border border-slate-200 rounded hover:bg-slate-50" onclick="selectModel('gpt-5-turbo')">GPT-5-Turbo (Fast)</button>
                <button class="w-full text-left px-3 py-2 border border-slate-200 rounded hover:bg-slate-50" onclick="selectModel('gpt-4.1-mini')">GPT-4.1-mini (Economy)</button>
            </div>
            <div class="mt-4 flex justify-end">
                <button onclick="closeModelModal()" class="px-4 py-2 bg-slate-100 rounded">Close</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // State - Python-style component state
        let state = {
            docs: [{id: 'sample', name: 'Sample.pdf', pages: 3, url: '/sample.pdf'}],
            activeDoc: 'sample',
            page: 1,
            numPages: null,
            selectedDocs: {sample: true},
            draft: '',
            mode: 'guided',
            messages: [],
            showModel: false,
            model: 'gpt-5',
            debateOpen: false,
            debateCols: {Legal: [], Finance: [], Compliance: []},
            consensus: 'Consensus pending...',
            highlights: [],
            searchQuery: '',
            manageAgentsOpen: false,
            navOpen: true
        };

        // Navigation toggle
        function toggleNav() {
            state.navOpen = !state.navOpen;
            const sidebar = document.getElementById('sidebar');
            const mainGrid = document.getElementById('mainGrid');
            const navIcon = document.getElementById('navIcon');
            
            if (state.navOpen) {
                sidebar.classList.remove('hidden');
                mainGrid.className = 'grid gap-3 p-3 grid-cols-[260px_1fr] md:grid-cols-[280px_1fr_520px]';
                navIcon.setAttribute('data-lucide', 'panel-left-close');
            } else {
                sidebar.classList.add('hidden');
                mainGrid.className = 'grid gap-3 p-3 grid-cols-2';
                navIcon.setAttribute('data-lucide', 'panel-left-open');
            }
            lucide.createIcons();
        }

        // File handling - Python-style async functions
        function handlePickFile() {
            document.getElementById('fileUpload').click();
        }

        async function handleUploadFile(e) {
            const file = e.target.files?.[0];
            if (!file) return;
            
            addMessage('assistant', `📤 Uploading ${file.name}...`);
            
            try {
                // Get presigned URL
                const response = await fetch('https://ns7ycm3h04.execute-api.us-east-1.amazonaws.com/prod/presign', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({filename: file.name, contentType: file.type})
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    // Upload to S3
                    const uploadResponse = await fetch(data.uploadUrl, {
                        method: 'PUT',
                        body: file,
                        headers: {'Content-Type': file.type}
                    });
                    
                    if (uploadResponse.ok) {
                        // Trigger processing
                        const docId = `doc_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                        await fetch('https://ns7ycm3h04.execute-api.us-east-1.amazonaws.com/prod/ingest', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                docId: docId,
                                docName: file.name,
                                bucket: 'documentgpt-uploads-1757887191',
                                key: data.key
                            })
                        });
                        
                        addDocLocal(file.name, data.uploadUrl, docId);
                        addMessage('assistant', `✅ Successfully uploaded and processing ${file.name}`);
                    } else {
                        throw new Error('S3 upload failed');
                    }
                } else {
                    throw new Error('Presign failed');
                }
            } catch (err) {
                console.error('Upload failed', err);
                addMessage('assistant', `❌ Upload failed: ${file.name}`);
            }
        }

        function addDocLocal(name, url, docId) {
            const id = docId || crypto.randomUUID();
            state.docs.push({id, name, pages: 1, url});
            state.selectedDocs[id] = true;
            state.activeDoc = id;
            updateDocDisplay();
            updateRecentChats();
            
            // Wait for processing then reload documents
            setTimeout(() => {
                loadDocuments();
            }, 3000);
        }

        function setActiveDoc(docId) {
            state.activeDoc = docId;
            state.selectedDocs = {};
            state.selectedDocs[docId] = true;
            updateDocDisplay();
            updateRecentChats();
            console.log('Switched to document:', docId);
        }

        function updateDocDisplay() {
            const doc = state.docs.find(d => d.id === state.activeDoc);
            if (doc) {
                document.getElementById('docName').textContent = doc.name;
                document.getElementById('docPages').textContent = `• ${doc.pages}p`;
                
                // Update PDF viewer
                const pdfContent = document.getElementById('pdfContent');
                pdfContent.innerHTML = `
                    <div class="text-center p-8">
                        <div class="text-lg font-medium text-slate-700 mb-2">${doc.name}</div>
                        <div class="text-sm text-slate-500 mb-4">Document ready for analysis</div>
                        <div class="text-xs text-slate-400">Ask questions in the chat panel →</div>
                    </div>
                `;
            }
        }
        
        function startNewChat() {
            // Save current chat to history if it has messages
            if (state.messages.length > 1) {
                const chatHistory = JSON.parse(localStorage.getItem('chatHistory') || '[]');
                const currentDoc = state.docs.find(d => d.id === state.activeDoc);
                chatHistory.unshift({
                    id: Date.now(),
                    docName: currentDoc?.name || 'Unknown Document',
                    docId: state.activeDoc,
                    messages: state.messages,
                    timestamp: new Date().toISOString()
                });
                // Keep only last 10 chats
                localStorage.setItem('chatHistory', JSON.stringify(chatHistory.slice(0, 10)));
            }
            
            // Clear current chat
            state.messages = [];
            document.getElementById('chatMessages').innerHTML = '';
            addMessage('assistant', 'Started a new chat! Upload a document or select one from your chat history to begin.');
        }

        // Chat functionality - Python-style message handling
        function addMessage(role, text, citations = []) {
            const msg = {
                id: crypto.randomUUID(),
                role,
                ts: Date.now(),
                text,
                citations
            };
            state.messages.push(msg);
            renderMessage(msg);
        }

        function renderMessage(msg) {
            const chat = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] md:max-w-[78%] rounded-2xl border border-slate-200 p-3 shadow-sm ${
                msg.role === 'user' ? 'bg-white text-slate-900' : 'bg-white/90 text-slate-800'
            }`;
            
            bubble.innerHTML = `
                <div class="mb-1 flex items-center gap-2 text-[11px] ${msg.role === 'user' ? 'text-slate-600' : 'text-slate-500'}">
                    ${msg.role === 'assistant' ? '<i data-lucide="bot" class="h-3.5 w-3.5"></i><span>Assistant</span>' : '<span>You</span>'}
                    <span>•</span><span>${new Date(msg.ts).toLocaleTimeString()}</span>
                </div>
                <div class="text-sm leading-relaxed whitespace-pre-wrap">${msg.text}</div>
                ${msg.citations ? renderCitations(msg.citations) : ''}
            `;
            
            msgDiv.appendChild(bubble);
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
            lucide.createIcons();
        }

        function renderCitations(citations) {
            return `
                <div class="mt-2 space-y-2">
                    ${citations.map((c, idx) => `
                        <div class="bg-white/90 border border-slate-200 rounded p-2 text-xs text-slate-800">
                            <div class="flex items-center justify-between mb-1">
                                <div class="flex items-center gap-2 text-slate-500">
                                    <i data-lucide="quote" class="h-3.5 w-3.5"></i>
                                    <span>${getDocName(c.docId)} — p.${c.page}</span>
                                </div>
                                <button class="h-7 px-2 gap-1 text-slate-700 hover:bg-slate-50 rounded" onclick="viewCitation('${c.docId}', ${c.page})">
                                    <i data-lucide="link" class="h-3.5 w-3.5"></i>View
                                </button>
                            </div>
                            <div>"${c.quote}"</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function getDocName(docId) {
            return state.docs.find(d => d.id === docId)?.name || 'Unknown';
        }

        // Chat streaming - Python-style async/await
        async function handleSend() {
            const content = state.draft.trim();
            if (!content) return;
            
            state.draft = '';
            document.getElementById('messageInput').value = '';
            
            addMessage('user', content);
            
            const respId = crypto.randomUUID();
            const assistantMsg = {id: respId, role: 'assistant', ts: Date.now(), text: ''};
            state.messages.push(assistantMsg);
            renderMessage(assistantMsg);
            
            // Use the most recent document or active document
            let docId = state.activeDoc;
            if (!docId && state.docs.length > 0) {
                docId = state.docs[0].id; // Use first available document
            }
            
            console.log('Using docId:', docId);
            
            try {
                const res = await fetch('https://ns7ycm3h04.execute-api.us-east-1.amazonaws.com/prod/rag', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        question: content,
                        docId: docId
                    })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    assistantMsg.text = data.answer || 'Response received';
                    assistantMsg.citations = data.citations ? data.citations.map(c => ({
                        docId: c.docId || docId,
                        page: c.page || 1,
                        quote: c.text || 'Citation text'
                    })) : [];
                    updateMessageText(respId, assistantMsg.text);
                } else {
                    throw new Error('API error');
                }
            } catch (e) {
                console.error('Chat error:', e);
                assistantMsg.text = 'Sorry, there was an error processing your request.';
                updateMessageText(respId, assistantMsg.text);
            }
        }

        function updateMessageText(msgId, text) {
            const msgElements = document.querySelectorAll('#chatMessages > div');
            // Update the last message text
            if (msgElements.length > 0) {
                const lastMsg = msgElements[msgElements.length - 1];
                const textDiv = lastMsg.querySelector('.text-sm.leading-relaxed');
                if (textDiv) textDiv.textContent = text;
            }
        }

        function updateMessageCitations(msgId, citations) {
            // Implementation for updating citations in real-time
        }

        // Suggestion chips
        function useSuggestion(text) {
            document.getElementById('messageInput').value = text;
            state.draft = text;
            handleSend();
        }

        // Model selection
        function openModelModal() {
            state.showModel = true;
            document.getElementById('modelModal').classList.remove('hidden');
        }

        function closeModelModal() {
            state.showModel = false;
            document.getElementById('modelModal').classList.add('hidden');
        }

        function selectModel(model) {
            state.model = model;
            const displayName = model === 'gpt-5' ? 'GPT-5' : 
                               model === 'gpt-5-turbo' ? 'GPT-5-TURBO' : 
                               model === 'gpt-4.1-mini' ? 'GPT-4.1-MINI' : model.toUpperCase();
            document.querySelectorAll('[onclick="openModelModal()"]').forEach(btn => {
                btn.textContent = `Model: ${displayName}`;
            });
            closeModelModal();
        }

        // Search and highlights
        function handleSearch() {
            if (!state.searchQuery.trim()) return;
            const id = crypto.randomUUID();
            state.highlights = [{id, page: state.page, x: 200, y: 300, w: 300, h: 60}];
            showHighlight();
            setTimeout(() => state.highlights = [], 2500);
        }

        function showHighlight() {
            const highlights = document.getElementById('highlights');
            highlights.innerHTML = '<div class="absolute highlight-box rounded-lg" style="left: 200px; top: 300px; width: 300px; height: 60px;"></div>';
            setTimeout(() => highlights.innerHTML = '', 2200);
        }

        function viewCitation(docId, page) {
            if (state.activeDoc !== docId) setActiveDoc(docId);
            state.page = page;
            showHighlight();
        }

        // Debate functionality
        function toggleDebate() {
            state.debateOpen = !state.debateOpen;
            const consensusBar = document.getElementById('consensusBar');
            
            if (state.debateOpen) {
                consensusBar.classList.remove('hidden');
                startDebateStream();
            } else {
                consensusBar.classList.add('hidden');
            }
        }

        function startDebateStream() {
            // Simulate multi-agent debate
            const agents = ['Legal', 'Finance', 'Compliance'];
            const arguments = {
                Legal: ['Legal perspective on contract terms...', 'Compliance with regulations...'],
                Finance: ['Payment terms analysis...', 'Budget considerations...'],
                Compliance: ['Data retention policies...', 'Security protocols...']
            };
            
            // Simulate streaming arguments
            setTimeout(() => {
                document.getElementById('consensusText').textContent = 'Consensus reached: Contract approved with minor revisions.';
            }, 5000);
        }

        // Presets
        function usePreset(presetName) {
            alert(`Using preset: ${presetName}`);
        }

        function toggleAgentDocs() {
            // Toggle agent & docs dropdown
        }

        // Page navigation
        function initPageNav() {
            const nav = document.getElementById('pageNav');
            nav.innerHTML = '';
            for (let i = 1; i <= (state.numPages || 3); i++) {
                const btn = document.createElement('button');
                btn.className = `w-full aspect-[3/4] rounded-lg border border-slate-200 bg-white text-xs flex items-center justify-center hover:bg-slate-50 ${i === state.page ? 'ring-2 ring-sky-300' : ''}`;
                btn.textContent = `p.${i}`;
                btn.onclick = () => setPage(i);
                nav.appendChild(btn);
            }
        }

        function setPage(page) {
            state.page = page;
            initPageNav();
        }

        // Event listeners
        document.getElementById('messageInput').addEventListener('input', (e) => {
            state.draft = e.target.value;
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            state.searchQuery = e.target.value;
        });

        // Load documents from API
        async function loadDocuments() {
            try {
                const response = await fetch('https://ns7ycm3h04.execute-api.us-east-1.amazonaws.com/prod/documents');
                if (response.ok) {
                    const data = await response.json();
                    if (data.documents && data.documents.length > 0) {
                        // Filter for completed documents and sort by most recent
                        const completedDocs = data.documents
                            .filter(doc => doc.status === 'completed' && doc.docName)
                            .sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
                        
                        state.docs = completedDocs.map(doc => ({
                            id: doc.docId,
                            name: doc.docName,
                            pages: 1,
                            url: `/doc/${doc.docId}`,
                            status: doc.status,
                            createdAt: doc.createdAt
                        }));
                        
                        console.log('Loaded documents:', state.docs);
                        
                        // Set most recent document as active
                        if (state.docs.length > 0) {
                            state.activeDoc = state.docs[0].id;
                            state.selectedDocs = {};
                            state.selectedDocs[state.activeDoc] = true;
                            console.log('Active document set to:', state.activeDoc);
                        }
                        updateDocDisplay();
                        updateRecentChats();
                    } else {
                        console.log('No completed documents found');
                        updateRecentChats();
                    }
                } else {
                    console.error('Failed to fetch documents:', response.status);
                }
            } catch (error) {
                console.error('Failed to load documents:', error);
            }
        }

        // Update recent chats section
        function updateRecentChats() {
            const recentSection = document.querySelector('.flex-1.overflow-y-auto .p-3');
            recentSection.innerHTML = '';
            
            if (state.docs.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'text-center text-slate-500 text-sm p-4';
                emptyMsg.textContent = 'No documents uploaded yet';
                recentSection.appendChild(emptyMsg);
                return;
            }
            
            state.docs.forEach(doc => {
                const chatBtn = document.createElement('button');
                chatBtn.className = `w-full text-left rounded-xl border border-slate-200/80 bg-white/90 px-3 py-2 hover:bg-white ${doc.id === state.activeDoc ? 'ring-2 ring-emerald-300' : ''}`;
                chatBtn.onclick = () => setActiveDoc(doc.id);
                chatBtn.innerHTML = `
                    <div class="text-sm truncate">${doc.name}</div>
                    <div class="text-[11px] text-slate-500">Ready for chat</div>
                `;
                recentSection.appendChild(chatBtn);
            });
        }
        
        // Toggle Agent & Docs dropdown
        function toggleAgentDocs() {
            const dropdown = document.getElementById('agentDocsDropdown');
            if (dropdown) {
                dropdown.remove();
                return;
            }
            
            const button = document.querySelector('[onclick="toggleAgentDocs()"]');
            const rect = button.getBoundingClientRect();
            
            const dropdownDiv = document.createElement('div');
            dropdownDiv.id = 'agentDocsDropdown';
            dropdownDiv.className = 'fixed bg-white border border-slate-200 rounded-lg shadow-lg p-3 z-50';
            dropdownDiv.style.top = (rect.bottom + 5) + 'px';
            dropdownDiv.style.left = rect.left + 'px';
            dropdownDiv.style.minWidth = '250px';
            
            let content = '<div class="text-sm font-medium mb-2">Available Documents:</div>';
            if (state.docs.length === 0) {
                content += '<div class="text-xs text-slate-500">No documents uploaded</div>';
            } else {
                state.docs.forEach(doc => {
                    const isSelected = doc.id === state.activeDoc;
                    content += `
                        <div class="flex items-center gap-2 p-2 hover:bg-slate-50 rounded cursor-pointer ${isSelected ? 'bg-emerald-50' : ''}" onclick="setActiveDoc('${doc.id}'); document.getElementById('agentDocsDropdown').remove();">
                            <input type="checkbox" ${isSelected ? 'checked' : ''} class="w-3 h-3">
                            <span class="text-xs truncate">${doc.name}</span>
                        </div>
                    `;
                });
            }
            
            dropdownDiv.innerHTML = content;
            document.body.appendChild(dropdownDiv);
            
            // Close on outside click
            setTimeout(() => {
                document.addEventListener('click', function closeDropdown(e) {
                    if (!dropdownDiv.contains(e.target) && e.target !== button) {
                        dropdownDiv.remove();
                        document.removeEventListener('click', closeDropdown);
                    }
                });
            }, 100);
        }

        // Initialize - Python-style component lifecycle
        function init() {
            initPageNav();
            loadDocuments();
            
            // Load chat history if available
            const chatHistory = JSON.parse(localStorage.getItem('chatHistory') || '[]');
            if (chatHistory.length > 0) {
                addMessage('assistant', `Welcome back! You have ${chatHistory.length} previous chats. Upload documents and ask questions, or try the Multi-Agent Debate feature.`);
            } else {
                addMessage('assistant', 'Welcome to DocumentsGPT v5! Upload documents and ask questions, or try the Multi-Agent Debate feature for collaborative analysis.');
            }
            
            lucide.createIcons();
        }

        // Start the app
        init();
    </script>
