AWSTemplateFormatVersion: '2010-09-09'
Description: 'DocumentGPT AWS Resources'

Resources:
  # S3 Bucket for documents
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: documentgpt-uploads
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # DynamoDB Table
  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: documents
      AttributeDefinitions:
        - AttributeName: docId
          AttributeType: S
      KeySchema:
        - AttributeName: docId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true

  # SNS Topic for notifications
  DocumentProcessingTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: document-processing-notifications

  # Lambda execution role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DocumentGPTPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:*
                  - s3:*
                  - textract:*
                  - sns:*
                Resource: '*'

  # CloudWatch Log Groups
  DocumentProcessingLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/document-processing
      RetentionInDays: 14

  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/apigateway/api-gateway
      RetentionInDays: 14

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/lambda-functions
      RetentionInDays: 14

Outputs:
  BucketName:
    Description: 'S3 Bucket Name'
    Value: !Ref DocumentsBucket
    
  TableName:
    Description: 'DynamoDB Table Name'
    Value: !Ref DocumentsTable
    
  TopicArn:
    Description: 'SNS Topic ARN'
    Value: !Ref DocumentProcessingTopic