<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocumentsGPT v5 - Polished</title>

        /* Polished ChatPDF-style improvements */
        :root {
            --panel-bg: rgba(255,255,255,.95);
            --panel-border: #e2e8f0;
        }
        body { background: linear-gradient(180deg,#f8fafc 0%, #f6f9fb 100%); }
        
        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(6px);
            border: 1px solid var(--panel-border);
            border-radius: 1rem;
            box-shadow: 0 1px 6px rgba(15,23,42,.06);
        }
        
        .card-row {
            border: 1px solid rgba(226,232,240,.8);
            background: rgba(255,255,255,.95);
            border-radius: .75rem;
            padding: .5rem .75rem;
            transition: box-shadow .2s ease, transform .2s ease;
        }
        .card-row:hover { box-shadow: 0 6px 14px rgba(15,23,42,.06); transform: translateY(-1px); }
        
        .chat-body { font-size: 15px; line-height: 1.65; color: #0f172a; }
        .text-secondary { color: #64748b; }
        .section-label { font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: #64748b; }
        
        .gradient-text { background: linear-gradient(to right, #10b981, #14b8a6, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-btn { background: linear-gradient(to right, #10b981, #0ea5e9); }
        
        .shrink-0 { flex-shrink: 0; }
        .place-items-center { place-items: center; }
        .sticky { position: sticky; }
        .bottom-0 { bottom: 0; }
        .z-10 { z-index: 10; }
        .border-dashed { border-style: dashed; }
        .border-sky-300 { border-color: #7dd3fc; }
        .w-8 { width: 2rem; }
        .h-8 { height: 2rem; }
        .mt-1 { margin-top: 0.25rem; }
    </style>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="w-full min-h-screen text-slate-800 grid grid-rows-[56px_1fr]">
    <!-- TOP BAR -->
    <div class="px-3 md:px-4 h-14 flex items-center justify-between border-b border-slate-200/80 bg-white/70 backdrop-blur">
        <div class="flex items-center gap-2 md:gap-3">
            <button id="navToggle" class="mr-1 p-2 hover:bg-slate-100 rounded" onclick="toggleNav()">
                <i data-lucide="panel-left-close" class="h-5 w-5" id="navIcon"></i>
            </button>
            <i data-lucide="sparkles" class="h-5 w-5 text-emerald-500"></i>
            <span class="text-base md:text-lg font-semibold gradient-text">DocumentsGPT</span>
            <span class="ml-2 px-2 py-1 text-xs border border-slate-200 rounded hidden md:inline">v5</span>
        </div>
        <div class="flex items-center gap-2">
            <button id="modelBtn" class="px-3 py-1 border border-slate-200 rounded text-sm hidden md:inline">Model: GPT-4-Turbo</button>
            <button id="debateBtn" class="px-3 py-1 border border-slate-200 rounded text-sm hidden md:inline flex items-center gap-1">
                <i data-lucide="users" class="h-4 w-4"></i>Debate
            </button>
            <button id="agentsBtn" class="px-3 py-1 border border-slate-200 rounded text-sm hidden md:inline">Assistant Tools</button>
        </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div id="mainGrid" class="grid gap-3 p-3 grid-cols-[260px_1fr] md:grid-cols-[280px_1fr_520px]">
        <!-- LEFT: Sidebar -->
        <aside id="sidebar" class="panel flex flex-col order-1">
            <div class="p-3 flex flex-col gap-2">
                <div class="grid grid-cols-2 gap-2">
                    <button class="gradient-btn text-white rounded-lg px-3 py-2 flex items-center justify-center gap-2" onclick="startNewChat()">
                        <i data-lucide="message-circle" class="h-4 w-4"></i>New Chat
                    </button>
                    <button class="border border-slate-200 rounded-lg px-3 py-2" onclick="handlePickFile()">Upload</button>
                    <input type="file" id="fileUpload" accept="application/pdf" style="display:none" onchange="handleUploadFile(event)">
                </div>
            </div>
            <div class="section-label px-4">Assistant Tools</div>
            <div class="p-3 space-y-2">
                <button onclick="usePreset('Legal/Finance/Compliance')" class="card-row flex items-center gap-2 w-full text-left" title="Assistant tools to help analyze your document">
                    <i data-lucide="briefcase" class="h-4 w-4 text-slate-400"></i>
                    <span class="text-sm flex-1 truncate">Legal/Finance/Compliance</span>
                </button>
                <button onclick="usePreset('Tech/Design/PM')" class="card-row flex items-center gap-2 w-full text-left">
                    <i data-lucide="code" class="h-4 w-4 text-slate-400"></i>
                    <span class="text-sm flex-1 truncate">Tech/Design/PM</span>
                </button>
            </div>
            <div class="section-label px-4">Chat History</div>
            <div class="flex-1 overflow-y-auto">
                <div class="p-3 space-y-2">
                    <button class="card-row flex items-center gap-2">
                        <i data-lucide="file-text" class="h-4 w-4 text-slate-400"></i>
                        <span class="text-sm flex-1 truncate">AI assistant</span>
                        <span class="text-[11px] text-secondary">2h ago</span>
                    </button>
                    <button class="card-row flex items-center gap-2">
                        <i data-lucide="file-text" class="h-4 w-4 text-slate-400"></i>
                        <span class="text-sm flex-1 truncate">Q3 review</span>
                        <span class="text-[11px] text-secondary">2h ago</span>
                    </button>
                </div>
            </div>
            <div class="p-3 border-t border-slate-200/80 flex items-center justify-between">
                <button class="text-xs text-slate-500">Settings</button>
                <button class="text-xs bg-gradient-to-r from-emerald-500 to-sky-500 bg-clip-text text-transparent">Upgrade</button>
            </div>
        </aside>

        <!-- CENTER: PDF Panel -->
        <div class="md:hidden flex items-center justify-center gap-2 p-2">
            <button class="px-3 py-1 rounded-full text-sm border" onclick="setActiveMobileTab('preview')">Preview</button>
            <button class="px-3 py-1 rounded-full text-sm border" onclick="setActiveMobileTab('chat')">Chat</button>
        </div>
        <section class="panel relative order-2" ondragover="event.preventDefault();showDrop(true)" ondragleave="showDrop(false)" ondrop="handleDrop(event)">
            <div id="dropOverlay" class="hidden absolute inset-0 z-10 flex items-center justify-center rounded-2xl border-2 border-dashed border-sky-300 bg-white/70">
                <div class="text-slate-600 text-sm">Drop PDF to upload</div>
            </div>
            <div class="h-full flex flex-col">
                <div class="p-3 border-b border-slate-200/80">
                    <div class="text-sm font-medium">Document Preview</div>
                </div>
                <div id="pdfViewer" class="flex-1 p-4 flex items-center justify-center text-slate-500">
                    <div class="text-center">
                        <i data-lucide="file-text" class="h-12 w-12 mx-auto mb-2 text-slate-300"></i>
                        <div>Upload a PDF to get started</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- RIGHT: Chat Panel -->
        <section class="panel flex flex-col order-3">
            <div class="p-3 border-b border-slate-200/80">
                <div class="text-sm font-medium">Chat</div>
            </div>
            <div id="chatMessages" class="flex-1 overflow-y-auto p-3 space-y-3" aria-live="polite">
                <!-- Messages will be rendered here -->
            </div>
            <div class="border-t border-slate-200/80 p-3 bg-white/70 sticky bottom-0">
                <div class="flex gap-2">
                    <input 
                        type="text" 
                        id="chatInput" 
                        placeholder="Ask anything about your document…" 
                        title="Type a question and press Enter"
                        class="flex-1 px-3 py-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-sky-300"
                        onkeypress="if(event.key==='Enter') sendMessage()"
                    >
                    <button onclick="sendMessage()" class="gradient-btn text-white px-4 py-2 rounded-lg">
                        <i data-lucide="send" class="h-4 w-4"></i>
                    </button>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Mobile tab functionality
        function setActiveMobileTab(tab) {
            const preview = document.querySelector('section.panel:nth-of-type(2)');
            const chat = document.querySelector('section.panel:nth-of-type(3)');
            if (tab === 'preview') {
                preview.classList.remove('hidden');
                chat.classList.add('hidden');
            } else {
                chat.classList.remove('hidden');
                preview.classList.add('hidden');
            }
        }

        // Drag and drop functionality
        function showDrop(show) {
            document.getElementById('dropOverlay').classList.toggle('hidden', !show);
        }

        async function handleDrop(e) {
            e.preventDefault();
            showDrop(false);
            const file = e.dataTransfer.files?.[0];
            if (!file) return;
            const fake = { target: { files: [file] } };
            await handleUploadFile(fake);
        }

        // Chat functionality with avatars
        function renderMessage(msg) {
            const chat = document.getElementById('chatMessages');
            const row = document.createElement('div');
            row.className = `flex gap-2 ${msg.role === 'user' ? 'justify-end' : ''}`;

            // Avatar
            const avatar = document.createElement('div');
            avatar.className = `mt-1 shrink-0 w-8 h-8 rounded-full grid place-items-center shadow-sm ${
                msg.role === 'assistant' ? 'bg-gradient-to-br from-emerald-400 to-sky-400 text-white' : 'bg-white border border-slate-200'
            }`;
            avatar.innerHTML = msg.role === 'assistant' ? 
                `<i data-lucide="bot" class="h-4 w-4"></i>` : 
                `<i data-lucide="user" class="h-4 w-4 text-slate-600"></i>`;

            // Bubble
            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] md:max-w-[78%] rounded-2xl border border-slate-200 p-3 shadow-sm ${
                msg.role === 'user' ? 'bg-white text-slate-900' : 'bg-white/95 text-slate-800'
            }`;

            bubble.innerHTML = `
                <div class="mb-1 flex items-center gap-2 text-[12px] ${msg.role === 'user' ? 'text-slate-600' : 'text-slate-500'}">
                    ${msg.role === 'assistant' ? 'Assistant' : 'You'}
                    <span>•</span><span>${new Date(msg.ts).toLocaleTimeString()}</span>
                </div>
                <div class="chat-body">${(msg.text || '').replace(/\n/g, '<br>')}</div>
            `;

            if (msg.role === 'assistant') {
                row.appendChild(avatar);
                row.appendChild(bubble);
            } else {
                row.appendChild(bubble);
                row.appendChild(avatar);
            }

            chat.appendChild(row);
            chat.scrollTop = chat.scrollHeight;
            lucide.createIcons();
        }

        // Basic functionality stubs
        function toggleNav() { console.log('Toggle nav'); }
        function startNewChat() { console.log('Start new chat'); }
        function handlePickFile() { document.getElementById('fileUpload').click(); }
        function usePreset(preset) { console.log('Use preset:', preset); }
        
        async function handleUploadFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            console.log('Upload file:', file.name);
            // Add upload logic here
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            // Add user message
            renderMessage({
                role: 'user',
                text: message,
                ts: Date.now()
            });

            input.value = '';

            // Simulate assistant response
            setTimeout(() => {
                renderMessage({
                    role: 'assistant',
                    text: `I understand you're asking about: "${message}". This is a demo response with improved styling and avatars.`,
                    ts: Date.now()
                });
            }, 1000);
        }

        // Demo message on load
        setTimeout(() => {
            renderMessage({
                role: 'assistant',
                text: 'Welcome to DocumentsGPT v5! Upload a PDF and ask me anything about it.',
                ts: Date.now()
            });
        }, 500);
    </script>
</body>
</html>
