<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocumentsGPT v5</title>
    <style>
        /* Base utilities */
        .flex{display:flex}.flex-1{flex:1}.flex-col{flex-direction:column}.items-center{align-items:center}.items-end{align-items:flex-end}.justify-between{justify-content:space-between}.justify-end{justify-content:flex-end}.gap-2{gap:0.5rem}.gap-3{gap:0.75rem}.h-4{height:1rem}.w-4{width:1rem}.h-5{height:1.25rem}.w-5{width:1.25rem}.h-8{height:2rem}.w-8{width:2rem}.h-12{height:3rem}.h-14{height:3.5rem}.h-full{height:100%}.w-full{width:100%}.p-2{padding:0.5rem}.p-3{padding:0.75rem}.p-4{padding:1rem}.px-3{padding-left:0.75rem;padding-right:0.75rem}.px-4{padding-left:1rem;padding-right:1rem}.py-1{padding-top:0.25rem;padding-bottom:0.25rem}.py-2{padding-top:0.5rem;padding-bottom:0.5rem}.text-sm{font-size:0.875rem}.text-xs{font-size:0.75rem}.text-lg{font-size:1.125rem}.font-medium{font-weight:500}.font-semibold{font-weight:600}.border{border-width:1px}.border-slate-200{border-color:#e2e8f0}.rounded{border-radius:0.25rem}.rounded-lg{border-radius:0.5rem}.rounded-xl{border-radius:0.75rem}.rounded-2xl{border-radius:1rem}.rounded-full{border-radius:9999px}.bg-white{background-color:white}.shadow-sm{box-shadow:0 1px 2px 0 rgba(0,0,0,0.05)}.hidden{display:none}.overflow-hidden{overflow:hidden}.overflow-y-auto{overflow-y:auto}.space-y-2>*+*{margin-top:0.5rem}.space-y-3>*+*{margin-top:0.75rem}.hover\:bg-slate-50:hover{background-color:#f8fafc}.hover\:shadow-sm:hover{box-shadow:0 1px 2px 0 rgba(0,0,0,0.05)}.cursor-pointer{cursor:pointer}.grid{display:grid}.grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid-rows-\[56px_1fr\]{grid-template-rows:56px 1fr}.aspect-\[3\/4\]{aspect-ratio:3/4}.min-h-screen{min-height:100vh}.max-w-\[85\%\]{max-width:85%}.min-h-\[44px\]{min-height:44px}.max-h-40{max-height:10rem}.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.text-slate-400{color:#94a3b8}.text-slate-500{color:#64748b}.text-slate-600{color:#475569}.text-slate-800{color:#1e293b}.text-emerald-500{color:#10b981}.text-white{color:white}.border-b{border-bottom-width:1px}.border-r{border-right-width:1px}.border-t{border-top-width:1px}.border-slate-200\/80{border-color:rgba(226,232,240,0.8)}.bg-white\/60{background-color:rgba(255,255,255,0.6)}.bg-white\/70{background-color:rgba(255,255,255,0.7)}.bg-white\/80{background-color:rgba(255,255,255,0.8)}.bg-white\/95{background-color:rgba(255,255,255,0.95)}.backdrop-blur-sm{backdrop-filter:blur(4px)}.fixed{position:fixed}.inset-0{top:0;right:0;bottom:0;left:0}.z-40{z-index:40}.z-50{z-index:50}.absolute{position:absolute}.relative{position:relative}.left-2{left:0.5rem}.ml-2{margin-left:0.5rem}.mb-1{margin-bottom:0.25rem}.mt-1{margin-top:0.25rem}.mt-4{margin-top:1rem}.pl-8{padding-left:2rem}.w-96{width:24rem}.resize-y{resize:vertical}.border-0{border-width:0}.outline-none{outline:2px solid transparent;outline-offset:2px}.placeholder\:text-slate-400::placeholder{color:#94a3b8}.bg-transparent{background-color:transparent}.whitespace-pre-wrap{white-space:pre-wrap}.text-\[11px\]{font-size:11px}.text-\[12px\]{font-size:12px}.text-\[15px\]{font-size:15px}.uppercase{text-transform:uppercase}.tracking-wide{letter-spacing:0.025em}.bg-black\/30{background-color:rgba(0,0,0,0.3)}.ring-2{box-shadow:0 0 0 2px rgba(59,130,246,0.5)}.ring-sky-300{--tw-ring-color:#7dd3fc}.sticky{position:sticky}.bottom-0{bottom:0}.shrink-0{flex-shrink:0}.place-items-center{place-items:center}.transition{transition:all 0.2s ease}@media(min-width:768px){.md\:inline{display:inline}.md\:grid-cols-\[280px_1fr_520px\]{grid-template-columns:280px 1fr 520px}}
        
        /* Theme */
        :root {
            --bg-gradient: linear-gradient(180deg, #f8fafc 0%, #f6f9fb 100%);
            --panel-bg: rgba(255,255,255,.95);
            --panel-border: #e2e8f0;
            --gradient-primary: linear-gradient(to right, #10b981, #0ea5e9);
            --gradient-text: linear-gradient(to right, #10b981, #14b8a6, #0ea5e9);
        }
        
        body { background: var(--bg-gradient); }
        
        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(4px);
            border: 1px solid var(--panel-border);
            border-radius: 1rem;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05);
        }
        
        .gradient-text { 
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .gradient-btn { 
            background: var(--gradient-primary);
            transition: opacity .2s;
        }
        .gradient-btn:hover { opacity: 0.9; }
        
        .avatar-bot {
            background: linear-gradient(135deg, #34d399, #0ea5e9);
        }
        
        .avatar-user {
            background: white;
            border: 1px solid #e2e8f0;
        }
        
        .highlight {
            background: rgba(16, 185, 129, 0.25);
            border: 2px solid rgba(16, 185, 129, 0.6);
            border-radius: 0.5rem;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="w-full min-h-screen text-slate-800 grid grid-rows-[56px_1fr]">
    <!-- Header -->
    <header class="px-4 h-14 flex items-center justify-between border-b border-slate-200/80 bg-white/80 backdrop-blur-sm">
        <div class="flex items-center gap-3">
            <i data-lucide="sparkles" class="h-5 w-5 text-emerald-500"></i>
            <h1 class="text-lg font-semibold gradient-text">DocumentsGPT</h1>
            <span class="ml-2 px-2 py-1 text-xs border border-slate-200 rounded">v5</span>
        </div>
        <div class="flex items-center gap-2">
            <button id="modelBtn" class="px-3 py-1 border border-slate-200 rounded text-sm" onclick="UI.openModal('model')">Model: <span id="currentModel">GPT-5</span></button>
            <button class="px-3 py-1 border border-slate-200 rounded text-sm" onclick="Chat.toggleDebate()">Debate</button>
        </div>
    </header>

    <!-- Main -->
    <main class="grid gap-3 p-3 md:grid-cols-[280px_1fr_520px]">
        <!-- Sidebar -->
        <aside class="panel p-3">
            <div class="grid grid-cols-2 gap-2">
                <button class="gradient-btn text-white rounded-lg px-3 py-2 flex items-center gap-2" onclick="App.loadSample()">
                    <i data-lucide="file-plus-2" class="h-4 w-4"></i>Sample
                </button>
                <button class="border border-slate-200 rounded-lg px-3 py-2" onclick="Upload.pick()">
                    Upload
                </button>
            </div>

            <div class="mt-4 space-y-2">
                <div class="text-[11px] uppercase tracking-wide text-slate-500">Presets</div>
                <button onclick="Chat.usePreset('Legal')" class="w-full text-left rounded-xl border border-slate-200/80 bg-white/95 px-3 py-2 hover:shadow-sm transition">
                    Legal/Finance/Compliance
                </button>
                <button onclick="Chat.usePreset('Tech')" class="w-full text-left rounded-xl border border-slate-200/80 bg-white/95 px-3 py-2 hover:shadow-sm transition">
                    Tech/Design/PM
                </button>
            </div>

            <div class="mt-4 space-y-2">
                <div class="text-[11px] uppercase tracking-wide text-slate-500">Recent</div>
                <div id="recentChats"></div>
            </div>
        </aside>

        <!-- PDF Viewer -->
        <section class="panel overflow-hidden">
            <div class="h-12 px-4 flex items-center justify-between border-b border-slate-200/80 bg-white/80">
                <div class="flex items-center gap-2">
                    <i data-lucide="file-text" class="h-4 w-4"></i>
                    <span class="font-medium" id="docName">Sample.pdf</span>
                    <span class="text-slate-500 text-sm" id="docPages">• 3p</span>
                </div>
                <div class="flex items-center gap-2">
                    <button class="px-2 py-1 border border-slate-200 rounded text-sm" onclick="PDF.zoom(-0.1)">–</button>
                    <button class="px-2 py-1 border border-slate-200 rounded text-sm" onclick="PDF.zoom(0.1)">+</button>
                    <span class="text-xs text-slate-500" id="pageInfo">Page 1 / 1</span>
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-2 top-2.5 h-4 w-4 text-slate-400"></i>
                        <input id="searchInput" class="pl-8 bg-white/70 border border-slate-200 rounded px-3 py-2" placeholder="Search PDF" onkeydown="if(event.key==='Enter') PDF.search()">
                    </div>
                    <button class="px-3 py-1 border border-slate-200 rounded text-sm" onclick="PDF.search()">Find</button>
                </div>
            </div>

            <div class="grid grid-cols-[180px_1fr] h-[calc(100vh-8rem)]">
                <div class="border-r border-slate-200/80 bg-white/60 overflow-y-auto">
                    <div class="p-2 space-y-2" id="pageNav"></div>
                </div>
                <div class="p-4 bg-white/60">
                    <div id="pdfViewer" class="relative w-full h-full bg-white border border-slate-200 rounded-lg flex items-center justify-center">
                        <div class="text-sm text-slate-500">Upload a PDF to get started</div>
                        <div id="highlights"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Chat -->
        <section class="panel flex flex-col">
            <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-3 bg-white/70"></div>

            <div class="border-t border-slate-200/80 p-3 bg-white/70 sticky bottom-0">
                <div class="rounded-2xl bg-white/80 border border-slate-200 p-2">
                    <div class="flex gap-2 flex-wrap px-2 py-1">
                        <span class="rounded-full border border-slate-200 px-3 py-1 text-xs bg-white cursor-pointer hover:shadow-sm transition" onclick="Chat.suggest('Summarize')">Summarize</span>
                        <span class="rounded-full border border-slate-200 px-3 py-1 text-xs bg-white cursor-pointer hover:shadow-sm transition" onclick="Chat.suggest('Key risks')">Key risks</span>
                        <span class="rounded-full border border-slate-200 px-3 py-1 text-xs bg-white cursor-pointer hover:shadow-sm transition" onclick="Chat.suggest('Find clauses')">Find clauses</span>
                    </div>
                    <div class="flex items-end gap-2 p-2">
                        <button class="rounded-full border border-slate-200 p-2" onclick="Upload.pick()">
                            <i data-lucide="paperclip" class="h-4 w-4"></i>
                        </button>
                        <textarea id="messageInput" placeholder="Ask about your document…" class="flex-1 min-h-[44px] max-h-40 resize-y bg-transparent border-0 p-2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();Chat.send();}"></textarea>
                        <button class="gradient-btn text-white rounded-full p-2" onclick="Chat.send()">
                            <i data-lucide="send" class="h-4 w-4"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modals -->
    <div id="modelModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/30">
        <div class="bg-white rounded-2xl p-6 w-96">
            <h2 class="text-lg font-semibold mb-4">Select Model</h2>
            <div class="space-y-2">
                <button class="w-full text-left px-3 py-2 border border-slate-200 rounded hover:bg-slate-50" onclick="App.setModel('gpt-5')">GPT-5 (Quality)</button>
                <button class="w-full text-left px-3 py-2 border border-slate-200 rounded hover:bg-slate-50" onclick="App.setModel('gpt-5-turbo')">GPT-5-Turbo (Fast)</button>
                <button class="w-full text-left px-3 py-2 border border-slate-200 rounded hover:bg-slate-50" onclick="App.setModel('gpt-4.1-mini')">GPT-4.1-mini (Economy)</button>
            </div>
            <div class="mt-4 flex justify-end">
                <button class="px-4 py-2 bg-slate-100 rounded" onclick="UI.closeModal('model')">Close</button>
            </div>
        </div>
    </div>

    <input id="fileInput" type="file" accept="application/pdf" style="display:none" onchange="Upload.handle(event)">

    <script>
        // App State
        const State = {
            docs: [
                { id: "sample", name: "Sample.pdf", pages: 3, url: "/sample.pdf" },
                { id: "d1", name: "MSA_v12.pdf", pages: 42, url: "/api/files/d1" },
                { id: "d2", name: "Vendor_NDA.pdf", pages: 7, url: "/api/files/d2" }
            ],
            activeDoc: "sample",
            page: 1,
            numPages: 3,
            zoom: 1,
            messages: [],
            model: "gpt-5",
            highlights: []
        };

        // API Config
        const API = {
            BASE: 'https://9voqzgx3ch.execute-api.us-east-1.amazonaws.com/prod',
            RAG: 'https://ns7ycm3h04.execute-api.us-east-1.amazonaws.com/prod'
        };

        // Utils
        const Utils = {
            markdown: (text) => (text || "")
                .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
                .replace(/^-\s(.+)$/gm, "• $1")
                .replace(/\n/g, "<br>"),
            
            uuid: () => crypto.randomUUID(),
            time: () => new Date().toLocaleTimeString()
        };

        // PDF Module
        const PDF = {
            zoom: (delta) => {
                State.zoom = Math.max(0.5, Math.min(2, State.zoom + delta));
            },
            
            setPage: (page) => {
                State.page = page;
                document.getElementById('pageInfo').textContent = `Page ${page} / ${State.numPages}`;
                PDF.renderNav();
            },
            
            renderNav: () => {
                const nav = document.getElementById('pageNav');
                nav.innerHTML = '';
                for (let i = 1; i <= State.numPages; i++) {
                    const btn = document.createElement('button');
                    btn.className = `w-full aspect-[3/4] rounded-lg border border-slate-200 bg-white text-xs flex items-center justify-center hover:bg-slate-50 ${i === State.page ? 'ring-2 ring-sky-300' : ''}`;
                    btn.textContent = `p.${i}`;
                    btn.onclick = () => PDF.setPage(i);
                    nav.appendChild(btn);
                }
            },
            
            search: async () => {
                const query = document.getElementById('searchInput').value.trim();
                if (!query) return;
                
                try {
                    const response = await fetch('/api/pdf/search', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ docId: State.activeDoc, query, pages: [State.page] })
                    });
                    
                    if (response.ok) {
                        const hits = await response.json();
                        PDF.showHighlights(hits);
                    }
                } catch (error) {
                    console.error('Search error:', error);
                }
            },
            
            showHighlights: (hits) => {
                const container = document.getElementById('highlights');
                const viewer = document.getElementById('pdfViewer');
                const W = viewer.clientWidth || 760;
                const H = viewer.clientHeight || 980;
                
                State.highlights = hits.map(h => ({
                    id: Utils.uuid(),
                    page: h.page,
                    x: Math.round(h.bbox.x * W),
                    y: Math.round(h.bbox.y * H),
                    w: Math.round(h.bbox.w * W),
                    h: Math.round(h.bbox.h * H)
                }));
                
                container.innerHTML = State.highlights
                    .filter(h => h.page === State.page)
                    .map(h => `<div class="absolute highlight" style="left:${h.x}px;top:${h.y}px;width:${h.w}px;height:${h.h}px"></div>`)
                    .join('');
                
                setTimeout(() => {
                    State.highlights = [];
                    container.innerHTML = '';
                }, 2500);
            }
        };

        // Chat Module
        const Chat = {
            add: (role, text, citations = []) => {
                const msg = {
                    id: Utils.uuid(),
                    role,
                    text,
                    citations,
                    ts: Date.now()
                };
                State.messages.push(msg);
                Chat.render(msg);
            },
            
            render: (msg) => {
                const chat = document.getElementById('chatMessages');
                const div = document.createElement('div');
                div.className = `flex gap-2 ${msg.role === 'user' ? 'justify-end' : ''}`;
                div.setAttribute('data-msg-id', msg.id);
                
                const avatar = msg.role === 'assistant' 
                    ? `<div class="mt-1 shrink-0 w-8 h-8 rounded-full avatar-bot text-white grid place-items-center"><i data-lucide="bot" class="h-4 w-4"></i></div>`
                    : `<div class="mt-1 shrink-0 w-8 h-8 rounded-full avatar-user grid place-items-center"><i data-lucide="user" class="h-4 w-4 text-slate-600"></i></div>`;
                
                const bubble = `
                    <div class="max-w-[85%] rounded-2xl border border-slate-200 p-3 shadow-sm ${msg.role === 'user' ? 'bg-white' : 'bg-white/95'}">
                        <div class="mb-1 text-[12px] text-slate-500">
                            ${msg.role === 'assistant' ? 'Assistant' : 'You'} • ${Utils.time()}
                        </div>
                        <div class="text-[15px] whitespace-pre-wrap">${Utils.markdown(msg.text)}</div>
                        ${Chat.renderCitations(msg.citations)}
                    </div>
                `;
                
                div.innerHTML = msg.role === 'assistant' ? avatar + bubble : bubble + avatar;
                chat.appendChild(div);
                chat.scrollTop = chat.scrollHeight;
                lucide.createIcons();
            },
            
            renderCitations: (citations) => {
                if (!citations?.length) return '';
                return `
                    <ol class="mt-2 text-xs text-slate-600 space-y-1">
                        ${citations.map((c, i) => `
                            <li>[${i + 1}] ${c.quote} 
                                <button class="underline" onclick="PDF.viewCitation('${c.docId}', ${c.page})">View</button>
                            </li>
                        `).join('')}
                    </ol>
                `;
            },
            
            send: async () => {
                const input = document.getElementById('messageInput');
                const text = input.value.trim();
                if (!text) return;
                
                input.value = '';
                Chat.add('user', text);
                
                const id = Utils.uuid();
                Chat.add('assistant', '…');
                
                try {
                    const response = await fetch(`${API.RAG}/rag`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question: text, docId: State.activeDoc })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        Chat.update(id, data.answer || 'Response received', data.citations);
                    } else {
                        Chat.update(id, 'Sorry, there was an error.');
                    }
                } catch (error) {
                    Chat.update(id, 'Connection error. Please try again.');
                }
            },
            
            update: (id, text, citations) => {
                const msgEl = document.querySelector(`[data-msg-id="${State.messages[State.messages.length - 1].id}"] .text-\\[15px\\]`);
                if (msgEl) {
                    msgEl.innerHTML = Utils.markdown(text);
                    State.messages[State.messages.length - 1].text = text;
                    State.messages[State.messages.length - 1].citations = citations;
                }
            },
            
            suggest: (text) => {
                document.getElementById('messageInput').value = text;
                Chat.send();
            },
            
            usePreset: (preset) => {
                Chat.add('assistant', `Using ${preset} preset for specialized analysis.`);
            },
            
            toggleDebate: () => {
                Chat.add('assistant', 'Multi-agent debate feature coming soon!');
            }
        };

        // Upload Module
        const Upload = {
            pick: () => {
                document.getElementById('fileInput').click();
            },
            
            handle: async (event) => {
                const file = event.target.files[0];
                if (!file) return;
                
                Chat.add('assistant', `Uploading ${file.name}...`);
                
                try {
                    const response = await fetch(`${API.BASE}/presign`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filename: file.name, contentType: file.type })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        const uploadResponse = await fetch(data.uploadUrl, {
                            method: 'PUT',
                            body: file,
                            headers: { 'Content-Type': file.type }
                        });
                        
                        if (uploadResponse.ok) {
                            Chat.add('assistant', `✅ Successfully uploaded ${file.name}`);
                            App.addDoc(file.name, data.uploadUrl);
                        }
                    }
                } catch (error) {
                    Chat.add('assistant', `❌ Upload failed: ${file.name}`);
                }
            }
        };

        // UI Module
        const UI = {
            openModal: (type) => {
                document.getElementById(`${type}Modal`).classList.remove('hidden');
            },
            
            closeModal: (type) => {
                document.getElementById(`${type}Modal`).classList.add('hidden');
            }
        };

        // Main App
        const App = {
            init: () => {
                PDF.renderNav();
                App.updateDoc();
                Chat.add('assistant', 'Welcome to DocumentsGPT v5! Upload a PDF and ask questions.');
                lucide.createIcons();
                
                // Keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                        e.preventDefault();
                        document.getElementById('searchInput').focus();
                    }
                    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                        e.preventDefault();
                        Chat.send();
                    }
                });
            },
            
            loadSample: () => {
                State.activeDoc = 'sample';
                App.updateDoc();
                Chat.add('assistant', 'Loaded sample document. Ask me anything about it!');
            },
            
            updateDoc: () => {
                const doc = State.docs.find(d => d.id === State.activeDoc);
                if (doc) {
                    document.getElementById('docName').textContent = doc.name;
                    document.getElementById('docPages').textContent = `• ${doc.pages}p`;
                    State.numPages = doc.pages;
                    PDF.setPage(1);
                }
            },
            
            addDoc: (name, url) => {
                const id = Utils.uuid();
                State.docs.push({ id, name, pages: 1, url });
                State.activeDoc = id;
                App.updateDoc();
            },
            
            setModel: (model) => {
                State.model = model;
                document.getElementById('currentModel').textContent = model.toUpperCase();
                UI.closeModal('model');
            }
        };

        // Start App
        App.init();
    </script>
</body>
</html>
